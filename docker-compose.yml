services:
  postgres:
    image: postgres:16-alpine
    container_name: ggboi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ggboi
      POSTGRES_USER: ggboi
      POSTGRES_PASSWORD: ggboi
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ggboi -d ggboi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
